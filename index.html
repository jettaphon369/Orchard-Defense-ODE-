<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#0a1022"><title>Orchard Defense Ultimate V3</title><link rel="stylesheet" href="style.css"></head><body>
<main id="app">
<header class="topbar"><div class="brand"><span class="brandIcon">🍑</span><div><b>ORCHARD DEFENSE</b><small>ULTIMATE V3</small></div></div><div class="stats"><div class="pill">☀️ <span id="energy">200</span></div><div class="pill">🌊 <span id="wave">1</span>/10</div><div class="pill hidePhone">💀 <span id="kills">0</span></div></div><button id="speedBtn" class="iconBtn">×1</button><button id="pauseBtn" class="iconBtn">Ⅱ</button></header>
<section class="gameShell"><canvas id="game" width="1120" height="630"></canvas><div class="castleHud"><span>🏰 สวนลอยฟ้า</span><div class="hpTrack"><i id="castleHpBar"></i></div><b><span id="castleHp">100</span>%</b></div><div id="banner" class="banner hidden"></div><div id="toast" class="toast hidden"></div>
<div id="startScreen" class="overlay"><div class="panel heroPanel"><div class="heroRow">🌻 ⚔️ 👾</div><h1>ORCHARD DEFENSE</h1><p>วางผู้พิทักษ์ ปกป้องสวนลอยฟ้าจากกองทัพเงา</p><button id="startBtn" class="primary">เริ่มเกม</button><small>แตะการ์ด แล้วแตะช่องบนสนาม</small></div></div>
<div id="pauseScreen" class="overlay hidden"><div class="panel"><h2>หยุดเกม</h2><button id="resumeBtn" class="primary">เล่นต่อ</button></div></div>
<div id="endScreen" class="overlay hidden"><div class="panel heroPanel"><div id="endIcon" class="heroRow">🏆</div><h2 id="endTitle"></h2><p id="endText"></p><button id="restartBtn" class="primary">เล่นอีกครั้ง</button></div></div></section>
<section id="unitTray" class="unitTray"></section><footer>แตะยูนิตบนสนามเพื่อขายคืน 40% • เลื่อนแถบการ์ดเพื่อดูยูนิตทั้งหมด</footer></main><script src="game.js"></script></body></html>
