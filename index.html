<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#07142d" />
  <title>Orchard Defense Ultimate V5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div class="brand"><span class="logo">🍑</span><span>ORCHARD DEFENSE</span><small>ULTIMATE V5</small></div>
      <div class="stats">
        <div class="pill" id="energyText">☀️ 150</div>
        <div class="pill" id="waveText">🌊 1/12</div><div class="pill" id="killText">💀 0</div>
        <button class="pill button" id="speedBtn" aria-label="ปรับความเร็ว">×1</button>
        <button class="pill button skill" id="skillBtn" aria-label="สกิลฮีโร่">⚡</button><button class="pill button" id="soundBtn" aria-label="เสียง">🔊</button><button class="pill button" id="pauseBtn" aria-label="หยุดเกม">Ⅱ</button>
      </div>
    </header>

    <section class="game-shell">
      <div id="game"></div>
      <div id="bossHud"><span>🐉 BOSS</span><div><i id="bossFill"></i></div></div><div id="orientationHint">หมุนโทรศัพท์เป็นแนวนอนเพื่อเล่นได้เต็มจอ</div>
    </section>

    <section class="deck-wrap">
      <div class="deck" id="deck"></div>
      <div class="help">แตะการ์ด → แตะช่องเพื่อวาง • แตะช่องเดิมเพื่อย้ายตำแหน่งเงา • แตะยูนิตเพื่อขาย 40% • ⚡ สกิลกำจัดศัตรูทั้งสนาม</div>
    </section>
  </main>

  <div id="loading">กำลังเปิดสวนลอยฟ้า…</div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
