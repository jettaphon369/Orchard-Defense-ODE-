<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#10182d" />
  <title>Orchard Defense: Remastered</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<main id="app">
  <header class="topbar">
    <div class="brand"><span class="logo">🍑</span><div><b>ORCHARD DEFENSE</b><small>REMASTERED</small></div></div>
    <div class="stats">
      <div class="pill">☀️ <span id="energy">175</span></div>
      <div class="pill">🌊 <span id="wave">1</span>/8</div>
      <div class="pill desktopStat">💀 <span id="kills">0</span></div>
    </div>
    <button id="pauseBtn" class="iconBtn" aria-label="หยุดเกม">Ⅱ</button>
  </header>

  <section class="gameShell">
    <canvas id="game" width="960" height="540" aria-label="สนามเกม Orchard Defense"></canvas>
    <div class="castleHud"><span>🏰 สวน</span><div class="hpTrack"><i id="castleHpBar"></i></div><b><span id="castleHp">100</span>%</b></div>
    <div id="banner" class="banner hidden"></div>
    <div id="toast" class="toast hidden"></div>
    <div id="startScreen" class="overlay">
      <div class="panel heroPanel"><div class="pixelHero">🌻⚔️👾</div><h1>ORCHARD DEFENSE</h1><p>ปกป้องสวนลอยฟ้าจากกองทัพแมลงเงา</p><button id="startBtn" class="primary">เริ่มป้องกันสวน</button><small>แตะการ์ด แล้วแตะช่องบนสนามเพื่อวางยูนิต</small></div>
    </div>
    <div id="endScreen" class="overlay hidden"><div class="panel heroPanel"><div id="endIcon" class="pixelHero">🏆</div><h2 id="endTitle">ชนะแล้ว!</h2><p id="endText"></p><button id="restartBtn" class="primary">เล่นอีกครั้ง</button></div></div>
    <div id="pauseScreen" class="overlay hidden"><div class="panel compact"><h2>หยุดเกม</h2><button id="resumeBtn" class="primary">เล่นต่อ</button></div></div>
  </section>

  <section class="unitTray" id="unitTray">
    <button class="unitCard" data-unit="sunny"><span class="cost">50</span><span class="sprite">🌻</span><b>Sunny</b><small>สร้างพลังงาน</small><i class="cooldown"></i></button>
    <button class="unitCard" data-unit="peach"><span class="cost">75</span><span class="sprite">🍑</span><b>Peachy</b><small>ยิงเมล็ด</small><i class="cooldown"></i></button>
    <button class="unitCard" data-unit="corn"><span class="cost">125</span><span class="sprite">🌽</span><b>Cobsworth</b><small>ยิงคู่</small><i class="cooldown"></i></button>
    <button class="unitCard" data-unit="spud"><span class="cost">100</span><span class="sprite">🥔</span><b>Spud</b><small>แทงค์</small><i class="cooldown"></i></button>
    <button class="unitCard" data-unit="chili"><span class="cost">150</span><span class="sprite">🌶️</span><b>Inferno</b><small>ระเบิดทั้งแถว</small><i class="cooldown"></i></button>
  </section>
  <footer class="help">แตะตัวละครบนสนามเพื่อขายคืน 40% • กด Esc เพื่อยกเลิก</footer>
</main>
<script src="game.js"></script>
</body>
</html>
