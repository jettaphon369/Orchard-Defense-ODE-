<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#4f8b3a">
  <title>Orchard Defense</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div class="topbar">
        <div class="pill">☀️ <span id="sunValue">150</span></div>
        <div class="pill">🌊 <span id="waveValue">0</span></div>
        <div class="pill">❤️ <span id="coreHpValue">100</span></div>
        <button id="startWaveBtn">เริ่มเวฟ</button>
      </div>

      <div id="cardBar"></div>
      <div id="message"></div>

      <div class="footer">
        <span>ด่าน <b id="levelValue">1</b></span>
        <span>ศัตรู <b id="enemyValue">0</b></span>
      </div>
    </div>

    <div id="endOverlay" class="hidden">
      <div class="modal">
        <h1>สวนถูกทำลาย</h1>
        <p id="endText"></p>
        <button onclick="location.reload()">เล่นใหม่</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
