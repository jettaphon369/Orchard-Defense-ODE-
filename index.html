<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#07142d" />
  <title>Orchard Defense Ultimate V4</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div class="brand"><span class="logo">🍑</span><span>ORCHARD DEFENSE</span><small>ULTIMATE V4</small></div>
      <div class="stats">
        <div class="pill" id="energyText">☀️ 150</div>
        <div class="pill" id="waveText">🌊 1/10</div>
        <button class="pill button" id="speedBtn" aria-label="ปรับความเร็ว">×1</button>
        <button class="pill button" id="pauseBtn" aria-label="หยุดเกม">Ⅱ</button>
      </div>
    </header>

    <section class="game-shell">
      <div id="game"></div>
      <div id="orientationHint">หมุนโทรศัพท์เป็นแนวนอนเพื่อเล่นได้เต็มจอ</div>
    </section>

    <section class="deck-wrap">
      <div class="deck" id="deck"></div>
      <div class="help">แตะการ์ด → แตะช่องเพื่อวาง • แตะช่องอื่นเพื่อย้ายเงาวางได้ทันที • แตะยูนิตเพื่อขาย 40%</div>
    </section>
  </main>

  <div id="loading">กำลังเปิดสวนลอยฟ้า…</div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
